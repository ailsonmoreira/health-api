services:
  db:
    image: 'postgres:16'
    container_name: health_db
    restart: always
    environment:
      - 'POSTGRES_DB=health_db'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
